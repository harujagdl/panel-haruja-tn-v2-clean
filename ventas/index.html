<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ventas & Comisiones | Haruja</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
    .wrap { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .page-header-wrapper { position: relative; }
    .panel-back-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      padding: 8px 16px;
      background: #f3f4f6;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #2563eb;
      text-decoration: none;
      border: 1px solid #e5e7eb;
      transition: all .2s ease;
    }
    .panel-back-btn:hover { background: #e5e7eb; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 12px; }
    .brandlink img { height: 36px; width:auto; display:block; }
    .card { background:#fff; border-radius:16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); padding: 18px; }
    h1 { margin: 0 0 12px; font-size: 34px; }
    .controls { display:flex; gap: 12px; flex-wrap: wrap; align-items: end; }
    .field { display:flex; flex-direction:column; gap: 6px; }
    .field label { font-size: 12px; color:#6b7280; }
    input, select { padding: 10px 12px; border-radius: 10px; border:1px solid #e5e7eb; font-size:14px; background:#fff; }
    button, .btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      line-height: 1.2;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-family: inherit;
    }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-secondary { background:#e5e7eb; color:#111827; }
    .status { margin-top: 8px; font-size: 13px; color:#6b7280; min-height: 18px; }
    .resumen-note { margin-top: 8px; font-size: 12px; color: #9ca3af; }
    .stats { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
    .stat { background:#f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; }
    .stat .label { font-size: 12px; color:#6b7280; }
    .stat .value { font-size: 18px; font-weight: 800; margin-top: 2px; }
    table { width:100%; border-collapse: collapse; font-size: 13px; background:#fff; margin-top: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #e5e7eb; text-align:left; vertical-align: middle; }
    .badge { font-size: 12px; border-radius: 999px; padding: 4px 8px; background: #fff3cd; color: #92400e; border: 1px solid #fde68a; }
    .ticket-tech { display:block; font-size: 11px; color:#6b7280; margin-top: 2px; }
    @media (max-width: 900px) { .stats { grid-template-columns: 1fr; } }
    @media (max-width: 640px) {
      .panel-back-btn { top: 14px; right: 16px; font-size: 13px; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap page-header-wrapper">
    <a href="/#/panel" class="panel-back-btn">← Volver al panel</a>
    <div class="topbar">
      <a class="brandlink" href="/#/panel">
        <img src="/assets/haruja-logo.png" alt="HarujaGdl">
      </a>
    </div>

    <div class="card">
      <h1>Ventas & Comisiones</h1>
      <div class="controls">
        <div class="field">
          <label for="month">Mes</label>
          <input id="month" type="month" />
        </div>
        <div class="field">
          <label for="search">Buscar</label>
          <input id="search" type="text" placeholder="Ticket, order_id o cliente" />
        </div>
        <div class="field">
          <label for="storeId">Store ID Tiendanube</label>
          <input id="storeId" type="text" placeholder="Se carga desde configuración" readonly />
        </div>
        <button id="btnLoad" class="btn btn-secondary">Ver detalle</button>
        <button id="btnCsv" class="btn btn-secondary">Export CSV</button>
        <a href="/api/tiendanube/start" class="btn btn-secondary">Conectar Tiendanube</a>
        <button id="btnSync" class="btn btn-primary">Sincronizar</button>
      </div>
      <div id="status" class="status"></div>
      <div class="status">Actualización automática por Tiendanube + refresh cada 60 s.</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">Total del mes</div><div id="totalMes" class="value">—</div></div>
      <div class="stat"><div class="label">Total por vendedora</div><div id="totalsBySeller" class="value">—</div></div>
      <div class="stat"><div class="label">Sin asignar</div><div id="sinAsignar" class="value">—</div></div>
      <div class="stat"><div class="label">Ticket promedio</div><div id="ticketPromedio" class="value">—</div></div>
    </div>
    <div class="resumen-note">Resumen calculado con ventas pagadas</div>

    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Ticket</th>
          <th>Cliente</th>
          <th>Total pagado</th>
          <th>Estado</th>
          <th>Vendedora</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="6">Cargando...</td></tr></tbody>
    </table>
  </div>

  <script>
    const SELLERS = ["Haru", "Vendedora"];
    const moneyMx = new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 2 });

    const monthInput = document.getElementById("month");
    const storeIdInput = document.getElementById("storeId");
    const searchInput = document.getElementById("search");
    const statusEl = document.getElementById("status");
    const tbody = document.getElementById("tbody");
    const totalMesEl = document.getElementById("totalMes");
    const totalsBySellerEl = document.getElementById("totalsBySeller");
    const sinAsignarEl = document.getElementById("sinAsignar");
    const ticketPromedioEl = document.getElementById("ticketPromedio");
    let ventasActuales = [];

    const setStatus = (txt = "", type = "info") => {
      statusEl.textContent = txt;
      statusEl.style.color = type === "error" ? "#b91c1c" : "#6b7280";
    };

    const safeJson = async (res, fallbackError = "Error inesperado") => {
      const raw = await res.text();
      let payload = {};
      if (raw) {
        try {
          payload = JSON.parse(raw);
        } catch (_err) {
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${raw.slice(0, 180) || fallbackError}`);
          }
          throw new Error(`Respuesta no JSON del servidor: ${raw.slice(0, 180)}`);
        }
      }
      if (!res.ok) {
        const msg = payload?.message || raw.slice(0, 180) || fallbackError;
        throw new Error(`HTTP ${res.status}: ${msg}`);
      }
      return payload;
    };

    const formatMoney = (value) => moneyMx.format(Number(value) || 0);
    const formatDate = (value) => value ? new Date(value).toLocaleDateString("es-MX") : "—";
    const formatMonth = (value) => String(value || "").slice(0, 7);
    const ticketText = (venta) => venta.ticket_label || (venta.ticket_number ? `#${venta.ticket_number}` : null) || venta.order_id || "-";
    const ticketCellHtml = (venta) => `${ticketText(venta)}<span class="ticket-tech">order_id: ${venta.order_id || "-"}</span>`;

    const paymentStatusEs = {
      paid: "Pagado",
      pending: "Pendiente",
      authorized: "Autorizado",
      cancelled: "Cancelado",
      refunded: "Reembolsado",
      voided: "Anulado"
    };

    const fulfillmentStatusEs = {
      delivered: "Entregado",
      unpacked: "No preparado",
      packed: "Empacado",
      shipped: "Enviado",
      unfulfilled: "No surtido",
      fulfilled: "Surtido"
    };

    const normalizeStatus = (value) => String(value || "").trim().toLowerCase();

    const formatEstado = (venta = {}) => {
      const paymentRaw = normalizeStatus(venta.payment_status);
      const fulfillmentRaw = normalizeStatus(venta.fulfillment_status);
      const paymentEs = paymentStatusEs[paymentRaw] || (paymentRaw ? paymentRaw : "");
      const fulfillmentEs = fulfillmentStatusEs[fulfillmentRaw] || (fulfillmentRaw ? fulfillmentRaw : "");
      if (paymentEs && fulfillmentEs) return `${paymentEs} / ${fulfillmentEs}`;
      return paymentEs || fulfillmentEs || "—";
    };

    const toCsvField = (value) => {
      const raw = value === null || value === undefined ? "" : String(value);
      const escaped = raw.replace(/"/g, '""');
      return `"${escaped}"`;
    };

    const formatCsvDate = (value) => {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toISOString().slice(0, 10);
    };

    const normalizeSeller = (value = "") => {
      const raw = String(value).trim().toLowerCase();
      if (raw === "haru") return "Haru";
      if (raw === "vendedora") return "Vendedora";
      return "";
    };

    const sellerSelectHtml = (selected = "") => {
      const currentSeller = normalizeSeller(selected);
      return `
        <select data-seller>
          <option value="__unassigned__" ${!currentSeller ? "selected" : ""}>Sin asignar</option>
          <option value="Haru" ${currentSeller === "Haru" ? "selected" : ""}>Haru</option>
          <option value="Vendedora" ${currentSeller === "Vendedora" ? "selected" : ""}>Vendedora</option>
        </select>`;
    };

    const loadVentasConfig = async () => {
      const url = new URL("/api/core", location.origin);
      url.searchParams.set("action", "ventas-config");
      const res = await fetch(url.toString());
      const payload = await safeJson(res, "No se pudo cargar la configuración de ventas");
      if (!payload?.ok) throw new Error(payload?.message || "No se pudo cargar la configuración de ventas");
      const data = payload.data || {};
      storeIdInput.value = data.store_id || "";
      return data;
    };

    const loadVentasResumen = async (month) => {
      const url = new URL("/api/core", location.origin);
      url.searchParams.set("action", "ventas-resumen");
      if (month) url.searchParams.set("month", month);
      const res = await fetch(url.toString());
      const payload = await safeJson(res, "No se pudo cargar el resumen de ventas");
      if (!payload?.ok) throw new Error(payload?.message || "No se pudo cargar el resumen de ventas");
      return payload.data || {};
    };

    const loadVentasDetalle = async (month, search) => {
      const url = new URL("/api/core", location.origin);
      url.searchParams.set("action", "ventas-detalle");
      if (month) url.searchParams.set("month", month);
      if (search) url.searchParams.set("search", search);
      const res = await fetch(url.toString());
      const payload = await safeJson(res, "No se pudo cargar el detalle de ventas");
      if (!payload?.ok) throw new Error(payload?.message || "No se pudo cargar el detalle de ventas");
      return Array.isArray(payload.data) ? payload.data : [];
    };

    const renderResumen = (resumen) => {
      const ticketPromedio = Number(resumen?.ticket_promedio ?? 0);
      totalMesEl.textContent = formatMoney(resumen.total_mes);
      totalsBySellerEl.textContent = `Haru ${formatMoney(resumen.total_haru)} · Vendedora ${formatMoney(resumen.total_vendedora)}`;
      sinAsignarEl.textContent = String(Number(resumen.sin_asignar) || 0);
      ticketPromedioEl.textContent = formatMoney(ticketPromedio);
    };

    const renderTabla = (ventas) => {
      if (!ventas.length) {
        tbody.innerHTML = `<tr><td colspan="6">No hay ventas para este mes.</td></tr>`;
        return;
      }
      tbody.innerHTML = ventas.map((venta) => {
        console.log("[ventas-detalle]", venta.order_id, venta.seller);
        const seller = normalizeSeller((venta.seller || "").trim());
        const noAssigned = !seller;
        return `
          <tr data-order-id="${venta.order_id}">
            <td>${formatDate(venta.created_at)}</td>
            <td>${ticketCellHtml(venta)}</td>
            <td>${venta.customer_name || "—"}</td>
            <td>${formatMoney(venta.total)}</td>
            <td>${formatEstado(venta)}</td>
            <td>${sellerSelectHtml(seller)} ${noAssigned ? '<span class="badge">Pendiente</span>' : ''}</td>
          </tr>`;
      }).join("");
    };

    const exportCsv = () => {
      const month = formatMonth(monthInput.value);
      if (!ventasActuales.length) {
        setStatus("No hay ventas para exportar en este mes.");
        return;
      }

      const headers = [
        "Fecha",
        "Ticket",
        "Cliente",
        "Total pagado",
        "Payment Status",
        "Fulfillment Status",
        "Estado (español)",
        "Vendedora",
        "Comisión",
        "Store ID",
        "Mes"
      ];

      const csvRows = [headers.map(toCsvField).join(",")];
      ventasActuales.forEach((venta) => {
        const row = [
          formatCsvDate(venta.created_at),
          ticketText(venta),
          venta.customer_name || "",
          Number(venta.total) || 0,
          normalizeStatus(venta.payment_status),
          normalizeStatus(venta.fulfillment_status),
          formatEstado(venta),
          normalizeSeller(venta.seller) || "",
          Number(venta.commission_amount) || 0,
          storeIdInput.value || "",
          venta.month_key || month
        ];
        csvRows.push(row.map(toCsvField).join(","));
      });

      const csvContent = `\uFEFF${csvRows.join("\n")}`;
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const downloadUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = downloadUrl;
      link.download = `ventas-${month || "mes"}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(downloadUrl);
      setStatus(`CSV exportado: ventas-${month || "mes"}.csv`);
    };


    const showOAuthMessage = () => {
      const params = new URLSearchParams(location.search);
      const oauth = params.get('oauth');
      if (!oauth) return;
      const message = params.get('message') || '';

      if (oauth === 'success') {
        setStatus('Conexión con Tiendanube completada.', 'info');
      } else {
        setStatus(message || 'No se pudo completar la conexión con Tiendanube.', 'error');
      }

      params.delete('oauth');
      params.delete('message');
      const search = params.toString();
      const nextUrl = `${location.pathname}${search ? `?${search}` : ''}${location.hash}`;
      window.history.replaceState({}, '', nextUrl);
    };

    const loadData = async () => {
      setStatus("Cargando ventas...");
      const month = formatMonth(monthInput.value);
      const search = String(searchInput.value || "").trim();
      const [resumen, detalle] = await Promise.all([
        loadVentasResumen(month),
        loadVentasDetalle(month, search)
      ]);

      ventasActuales = detalle;
      renderResumen(resumen);
      renderTabla(detalle);
      setStatus(`Listo. ${detalle.length} ventas.`);
    };

    const syncVentas = async () => {
      setStatus("Sincronizando con Tiendanube...");
      const res = await fetch("/api/core?action=ventas-sync", { method: "POST" });
      const payload = await safeJson(res, "No se pudo sincronizar ventas");
      if (!payload?.ok) throw new Error(payload?.message || "No se pudo sincronizar ventas");
      const data = payload.data || {};
      setStatus(`Sync OK: ${data.synced || 0} pedidos (${data.inserted || 0} nuevos / ${data.updated || 0} actualizados).`);
      await loadData();
    };

    const asignarVendedora = async (orderId, seller) => {
      const normalized = normalizeSeller(seller);
      if (!normalized) throw new Error("Selecciona una vendedora válida (Haru o Vendedora)");
      const res = await fetch("/api/core?action=assign-seller", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order_id: orderId, seller: normalized })
      });
      const payload = await safeJson(res, "No se pudo asignar vendedora");
      if (!payload?.ok) throw new Error(payload?.message || "No se pudo asignar vendedora");
      await loadData();
    };

    document.getElementById("btnLoad").addEventListener("click", () => loadData().catch((e) => setStatus(e.message || String(e), "error")));
    searchInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") loadData().catch((e) => setStatus(e.message || String(e), "error"));
    });

    document.getElementById("btnSync").addEventListener("click", () => syncVentas().catch((e) => setStatus(e.message || String(e), "error")));
    document.getElementById("btnCsv").addEventListener("click", exportCsv);

    tbody.addEventListener("change", (ev) => {
      if (!(ev.target instanceof HTMLSelectElement) || !ev.target.hasAttribute("data-seller")) return;
      const row = ev.target.closest("tr");
      const orderId = row?.getAttribute("data-order-id") || "";
      const seller = ev.target.value;
      if (!orderId || seller === "__unassigned__") {
        setStatus("Selecciona Haru o Vendedora para guardar la asignación.", "error");
        return;
      }
      asignarVendedora(orderId, seller).catch((e) => setStatus(e.message || String(e), "error"));
    });

    monthInput.value = new Date().toISOString().slice(0, 7);
    (async () => {
      try {
        showOAuthMessage();
        await loadVentasConfig();
      } catch (e) {
        setStatus(`No se pudo cargar configuración: ${e.message || String(e)}`, "error");
      }
      loadData().catch((e) => setStatus(e.message || String(e), "error"));
      setInterval(() => {
        loadData().catch(() => {});
      }, 60000);
    })();
  </script>
</body>
</html>
