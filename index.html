<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel Haruja TN v2</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f6f7fb;
      color:#111;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:32px 16px;
    }
    h1{margin:0 0 10px}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-top:24px;
    }
    a.card{
      display:block;
      text-decoration:none;
      color:inherit;
      background:#fff;
      border:1px solid #ddd;
      border-radius:16px;
      padding:18px;
    }
    a.card:hover{transform:translateY(-1px)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Panel Haruja TN v2</h1>
    <p>Base limpia de rescate.</p>

    <div class="grid">
      <a class="card" href="/ventas/index.html">Ventas</a>
      <a class="card" href="/apartados/index.html">Apartados</a>
      <a class="card" href="/apartados-historial/index.html">Historial de apartados</a>
      <a class="card" href="/ticket/index.html">Ticket</a>
    </div>
  </div>
</body>
</html>
