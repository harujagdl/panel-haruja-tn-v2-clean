<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticket Haruja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

:root{
--olive:#a7b59e;
--coffee:#383234;
--ivory:#faf7f2;
--paper:#fffdfa;
--line-soft:#d8d3cc;
--sand:#f1ece4;
}

*{box-sizing:border-box}

body{
font-family:"Segoe UI",Arial,sans-serif;
background:var(--ivory);
margin:0;
padding:24px;
color:var(--coffee);
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

.actions{
display:flex;
justify-content:flex-end;
gap:12px;
margin-bottom:14px;
max-width:820px;
margin-left:auto;
margin-right:auto;
}

.btn{
border:0;
border-radius:12px;
padding:11px 18px;
font-weight:700;
cursor:pointer;
font-size:14px;
}

.btn-back{
background:#efe8dd;
color:var(--coffee);
border:1px solid rgba(56,50,52,.15);
}

.btn-print{
background:var(--coffee);
color:var(--ivory);
}

.btn-secondary{
background:#f1ece4;
color:var(--coffee);
border:1px solid rgba(56,50,52,.2);
}

.pdf-status{
max-width:820px;
margin:0 auto 10px;
font-size:12px;
color:#5b5457;
}

.card{
width:min(100%,800px);
margin:auto;
background:var(--paper);
border-radius:16px;
padding:20px 24px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
border:1px solid rgba(167,181,158,.2);
page-break-inside:avoid;
}

.logo-wrap{
text-align:center;
margin-bottom:8px;
}

.logo{
width:200px;
max-width:100%;
height:auto;
display:block;
margin:auto;
}

.top-line{
border:0;
border-top:3px solid var(--coffee);
margin:8px 0 14px;
}

.top-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.title{
font-size:18px;
font-weight:700;
text-transform:uppercase;
}

.folio{
font-weight:700;
background:var(--sand);
padding:5px 10px;
border-radius:999px;
font-size:13px;
}

.meta{
display:grid;
grid-template-columns:88px 1fr;
gap:6px 12px;
font-size:13px;
margin-bottom:10px;
}

.section-title{
font-size:14px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.6px;
margin:10px 0 8px;
color:var(--olive);
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
text-align:left;
font-size:12px;
text-transform:uppercase;
background:var(--sand);
border-top:1px solid var(--line-soft);
border-bottom:1px solid var(--line-soft);
padding:8px 7px;
}

tbody td{
font-size:12.5px;
padding:8px 7px;
border-bottom:1px solid rgba(56,50,52,.09);
}

.ta-center{text-align:center}
.ta-right{text-align:right}

.totals{
width:310px;
margin-left:auto;
margin-top:10px;
background:var(--sand);
border:1px solid rgba(167,181,158,.4);
border-radius:12px;
padding:10px 12px;
}

.totals-row{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:13px;
}

.totals-grand{
border-top:2px solid var(--olive);
padding-top:10px;
margin-top:8px;
font-size:17px;
font-weight:800;
}

.legal{
margin-top:14px;
font-size:11.3px;
line-height:1.35;
}

.legal h4{
margin:10px 0 5px;
font-size:11.8px;
color:var(--olive);
border-left:4px solid var(--olive);
padding-left:8px;
}

.legal p{
margin:5px 0;
}

.bottom{
display:grid;
grid-template-columns:1fr 144px;
gap:12px;
margin-top:12px;
align-items:end;
}

.qr-box{
text-align:center;
background:var(--sand);
border:1px solid rgba(167,181,158,.45);
border-radius:12px;
padding:8px;
}

#qr{
display:block;
margin:auto;
}

.qr-caption{
font-size:10.5px;
}

@page{
size:Letter;
margin:10mm;
}

@media print{

body{
background:#fff;
padding:0;
}

.actions{
display:none;
}

.card{
box-shadow:none;
border-radius:0;
border:0;
width:100%;
max-width:100%;
padding:8px;
}

.legal{
font-size:10.7px;
line-height:1.28;
}

.bottom{
grid-template-columns:1fr 126px;
}

}

</style>
</head>

<body>

<div class="actions">
<button class="btn btn-back" onclick="history.back()">Volver</button>
<button class="btn btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>
<button id="btn-view-pdf" class="btn btn-secondary" style="display:none">Ver PDF</button>
<button id="btn-download-pdf" class="btn btn-secondary" style="display:none">Descargar PDF</button>
<button id="btn-refresh-pdf" class="btn btn-secondary" style="display:none">Actualizar PDF</button>
</div>

<div id="pdf-status" class="pdf-status"></div>
<div id="app"></div>

<script>

function getFolioFromPath(){
const parts=window.location.pathname.split('/').filter(Boolean)
if(parts[0]==='ticket' && parts[1]) return decodeURIComponent(parts[1])
return''
}

function money(v){
const n=Number(v||0)
return '$'+n.toLocaleString('es-MX',{minimumFractionDigits:2})
}

function esc(v){
return String(v??'')
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
}

async function loadTicket(){

const folio=getFolioFromPath()

if(!folio){
document.getElementById('app').innerHTML="Folio inválido"
return
}

const res=await fetch(`/api/apartados?action=detail&folio=${folio}`)
const payload=await res.json()
const data=payload?.data||payload

renderTicket(data)
await syncPdfUi(folio)

}


async function syncPdfUi(folio){
const statusEl=document.getElementById('pdf-status')
const viewBtn=document.getElementById('btn-view-pdf')
const downloadBtn=document.getElementById('btn-download-pdf')
const refreshBtn=document.getElementById('btn-refresh-pdf')
if(!statusEl||!viewBtn||!downloadBtn||!refreshBtn||!folio) return

const applyPdf=(pdfUrl,updatedAt)=>{
if(pdfUrl){
viewBtn.style.display='inline-block'
downloadBtn.style.display='inline-block'
viewBtn.onclick=()=>window.open(pdfUrl,'_blank','noopener')
downloadBtn.onclick=()=>window.open(pdfUrl,'_blank','noopener')
statusEl.textContent=`PDF persistente disponible${updatedAt?` · Actualizado: ${updatedAt}`:''}`
}else{
viewBtn.style.display='none'
downloadBtn.style.display='none'
statusEl.textContent='No existe PDF persistente todavía.'
}
}

refreshBtn.style.display='inline-block'
refreshBtn.onclick=async()=>{
refreshBtn.disabled=true
statusEl.textContent='Se está generando el PDF…'
try{
const res=await fetch(`/api/documentos?action=pdf-refresh&folio=${encodeURIComponent(folio)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:'manual_refresh'})})
const payload=await res.json()
const data=payload?.data||payload
if(!res.ok||payload?.ok===false) throw new Error(payload?.message||`HTTP ${res.status}`)
applyPdf(data.pdfUrl||'',data.updatedAt||'')
statusEl.textContent='PDF actualizado correctamente.'
}catch(err){
statusEl.textContent=`No se pudo actualizar el PDF: ${err?.message||'error'}`
}finally{
refreshBtn.disabled=false
}
}

try{
const res=await fetch(`/api/documentos?action=pdf-status&folio=${encodeURIComponent(folio)}`)
const payload=await res.json()
const data=payload?.data||payload
if(!res.ok||payload?.ok===false) throw new Error(payload?.message||`HTTP ${res.status}`)
applyPdf(data.pdfUrl||'',data.updatedAt||'')
}catch(err){
statusEl.textContent=`No se pudo consultar PDF persistente: ${err?.message||'error'}`
}
}

function renderTicket(payload){

const a=payload.apartado||payload

const items=a.productos||[]

const rows=items.length?items.map(i=>`

<tr>
<td>${esc(i.codigo)}</td>
<td>${esc(i.descripcion)}</td>
<td class="ta-center">${esc(i.cantidad||1)}</td>
<td class="ta-right">${money(i.precio)}</td>
<td class="ta-right">${money(i.subtotal)}</td>
</tr>

`).join(''):`<tr><td colspan="5" class="ta-center">No hay productos</td></tr>`

document.getElementById('app').innerHTML=`

<div class="card">

<div class="logo-wrap">
<img class="logo" src="/public/assets/haruja-logo.png" alt="HarujaGdl">
</div>

<hr class="top-line">

<div class="top-row">
<div class="title">Ticket de apartado</div>
<div class="folio">#${esc(a.folio)}</div>
</div>

<div class="meta">
<b>Fecha:</b><div>${esc(a.fecha)}</div>
<b>Cliente:</b><div>${esc(a.cliente)}</div>
<b>Contacto:</b><div>${esc(a.telefono||a.contacto)}</div>
</div>

<div class="section-title">Detalle</div>

<table>
<thead>
<tr>
<th>Código</th>
<th>Descripción</th>
<th class="ta-center">Cant</th>
<th class="ta-right">P.U.</th>
<th class="ta-right">Importe</th>
</tr>
</thead>
<tbody>${rows}</tbody>
</table>

<div class="totals">
<div class="totals-row"><b>Subtotal:</b><span>${money(a.subtotal)}</span></div>
<div class="totals-row"><b>Anticipo:</b><span>${money(a.anticipo)}</span></div>
<div class="totals-row"><b>Descuento:</b><span>${money(a.descuento)}</span></div>
<div class="totals-row totals-grand"><b>TOTAL</b><span>${money(a.total)}</span></div>
</div>

<div class="legal">

<p><strong>Gracias por tu compra en HarujaGdl</strong></p>

<p>Todos nuestros productos pasan por inspección para garantizar calidad, talla solicitada y que estén libres de defectos.</p>

<h4>CAMBIOS</h4>
<p>Solicítalo dentro de 7 días naturales de recibir tu compra.</p>
<p>La prenda debe estar nueva, sin uso, sin lavar y con etiquetas originales.</p>
<p>No aplican cambios en: prendas tejidas, bordadas, con aplicaciones, accesorios, prendas de ropa íntima, trajes de baño, rebajas o compras con cupón.</p>
<p>Los gastos de envío corren por cuenta del cliente.</p>
<p>Solicita tu cambio por WhatsApp al 33 3033 6506 indicando motivo, prenda y talla deseada.</p>

<h4>APARTADOS</h4>
<p>Puedes apartar con 25% de anticipo.</p>
<p>Plazo máximo para recoger: 30 días.</p>
<p>Pasado ese tiempo, la prenda vuelve a venta y el anticipo queda como saldo a favor por 3 meses a partir de la fecha inicial del apartado.</p>
<p>No aplican cambios ni devoluciones en apartados.</p>
<p>No realizamos devoluciones de dinero. Todos los cambios son por producto de igual o mayor valor.</p>

<p><strong>Gracias por elegirnos</strong></p>

</div>

<div class="bottom">

<div class="meta">
<b>Pedido:</b><div>${esc(a.folio)}</div>
<b>Fecha:</b><div>${esc(a.fecha)}</div>
<b>Cliente:</b><div>${esc(a.cliente)}</div>
<b>Contacto:</b><div>${esc(a.telefono||a.contacto)}</div>
</div>

<div class="qr-box">
<canvas id="qr"></canvas>
<div class="qr-caption">Escanea para ver tu apartado</div>
</div>

</div>

</div>
`

const urlStatus=`${window.location.origin}/apartado/${encodeURIComponent(a.folio||'')}`

QRCode.toCanvas(document.getElementById('qr'),urlStatus,{width:106,margin:1})

}

loadTicket()

</script>

</body>
</html>
